name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, 386]
        include:
          # Linux ARM 5 6 7
          - goos: linux
            goarch: arm
            goarm: 7
          - goos: linux
            goarch: arm
            goarm: 6
          - goos: linux
            goarch: arm
            goarm: 5
          # ARM64 & riscv64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: riscv64
          # MIPS
          - goos: linux
            goarch: mips64
          - goos: linux
            goarch: mips64le
          - goos: linux
            goarch: mipsle
          - goos: linux
            goarch: mips
      fail-fast: false

    runs-on: ubuntu-24.04
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: 0

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Show workflow information
        id: get_filename
        run: |
          export _NAME=$(jq ".[\"$GOOS-$GOARCH$GOARM$GOMIPS\"].friendlyName" -r < .github/build/friendly-filenames.json)
          echo "GOOS: $GOOS, GOARCH: $GOARCH, GOARM: $GOARM, GOMIPS: $GOMIPS, RELEASE_NAME: $_NAME"
          echo "ASSET_NAME=$_NAME" >> $GITHUB_OUTPUT
          echo "ASSET_NAME=$_NAME" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ^1.26.0

      - name: Tidy up dependencies
        run: go mod tidy

      - name: Build XMBox
        run: |
          mkdir -p build_assets
          go build -v -o build_assets/XMBox \
            -tags "sing xray hysteria2 with_quic with_grpc with_utls with_gvisor" \
            -trimpath -ldflags "-s -w -buildid=" ./main

      - name: Build Mips softfloat XMBox
        if: matrix.goarch == 'mips' || matrix.goarch == 'mipsle'
        run: |
          GOMIPS=softfloat go build -v -o build_assets/XMBox_softfloat \
            -tags "sing xray hysteria2 with_quic with_grpc with_utls with_gvisor" \
            -trimpath -ldflags "-s -w -buildid=" ./main

      - name: Prepare to release
        run: |
          set -e

          cp ${GITHUB_WORKSPACE}/main/files/config.yaml ./build_assets/config.yaml
          cp ${GITHUB_WORKSPACE}/main/files/dns.json    ./build_assets/dns.json
          cp ${GITHUB_WORKSPACE}/main/files/route.json  ./build_assets/route.json

          LIST=('sing-geoip geoip' 'sing-geosite geosite')

          for i in "${LIST[@]}"; do
            set -- $i
            REPO=$1
            NAME=$2
            FILE_NAME="${NAME}.db"

            URL="https://github.com/SagerNet/${REPO}/releases/latest/download/${FILE_NAME}"
            HASH_URL="${URL}.sha256sum"

            echo "Downloading ${URL}..."
            curl -L --retry 3 --retry-delay 2 --fail "$URL" -o "./build_assets/${FILE_NAME}"

            echo "Fetching hash..."
            HASH=$(curl -sL --fail "$HASH_URL" | awk '{print $1}')
            [ -n "$HASH" ] || { echo "Failed to fetch hash for ${FILE_NAME}"; exit 1; }

            echo "Verifying hash..."
            LOCAL_HASH=$(sha256sum "./build_assets/${FILE_NAME}" | awk '{print $1}')

            if [ "$LOCAL_HASH" != "$HASH" ]; then
              echo "Hash mismatch for ${FILE_NAME}"
              exit 1
            fi

            echo "${FILE_NAME} verified successfully"
          done

      - name: Create ZIP archive
        shell: bash
        run: |
          pushd build_assets || exit 1
          touch -mt $(date +%Y01010000) *
          zip -9vr ../XMBox-$ASSET_NAME.zip .
          popd || exit 1
          FILE=./XMBox-$ASSET_NAME.zip
          DGST=$FILE.dgst
          for METHOD in md5 sha1 sha256 sha512; do
            openssl dgst -$METHOD $FILE | sed 's/([^)]*)//g' >> $DGST
          done

      - name: Change the name
        run: mv build_assets XMBox-$ASSET_NAME

      # - name: Upload files to Artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: XMBox-${{ steps.get_filename.outputs.ASSET_NAME }}
      #     path: ./XMBox-${{ steps.get_filename.outputs.ASSET_NAME }}/*

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./XMBox-${{ steps.get_filename.outputs.ASSET_NAME }}.zip*
          tag: ${{ github.ref }}
          file_glob: true