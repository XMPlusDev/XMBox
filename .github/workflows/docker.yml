name: Publish Docker image
on:
  release:
    types:
      - published
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xmplusdev/xmbox
jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      actions: write
      
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64
          - linux/s390x
          
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Download geo data files
        run: |
          set -e
          mkdir -p ./build_assets
          LIST=('sing-geoip geoip-cn' 'sing-geosite geosite-cn' 'sing-geosite geosite-category-ads-all')

          for i in "${LIST[@]}"; do
            set -- $i
            REPO=$1
            NAME=$2
            FILE_NAME="${NAME}.srs"

            URL="https://github.com/SagerNet/${REPO}/rule-set/${FILE_NAME}"
            HASH_URL="${URL}.sha256sum"

            echo "Downloading ${URL}..."
            curl -L --retry 3 --retry-delay 2 --fail "$URL" -o "./build_assets/${FILE_NAME}"

            echo "Fetching hash..."
            HASH=$(curl -sL --fail "$HASH_URL" | awk '{print $1}')
            [ -n "$HASH" ] || { echo "Failed to fetch hash for ${FILE_NAME}"; exit 1; }

            echo "Verifying hash..."
            LOCAL_HASH=$(sha256sum "./build_assets/${FILE_NAME}" | awk '{print $1}')

            if [ "$LOCAL_HASH" != "$HASH" ]; then
              echo "Hash mismatch for ${FILE_NAME}"
              exit 1
            fi

            echo "${FILE_NAME} verified successfully"
          done  

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  merge:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      actions: write
      
    needs:
      - build
      
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          ls -al
          echo docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *) 
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}